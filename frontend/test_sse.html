<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSE Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a2e; color: #eee; }
        .container { max-width: 800px; margin: 0 auto; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .connected { background: #2ecc71; color: white; }
        .disconnected { background: #e74c3c; color: white; }
        .connecting { background: #f39c12; color: white; }
        .event-log { background: #16213e; padding: 15px; border-radius: 5px; max-height: 400px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .event-item { margin: 5px 0; padding: 5px; border-bottom: 1px solid #1f4068; }
        .event-type { color: #e94560; font-weight: bold; }
        .event-data { color: #0f3460; background: #e8f4f8; padding: 5px; border-radius: 3px; margin-top: 3px; }
        button { padding: 10px 20px; margin: 5px; background: #e94560; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        button:hover { background: #ff6b6b; }
        .score-display { background: #16213e; padding: 15px; border-radius: 5px; margin: 10px 0; }
        .score-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #1f4068; }
        .rank { font-weight: bold; color: #e94560; }
        .score { color: #f1c40f; font-weight: bold; }
        .new-record { animation: glow 0.5s ease-in-out 3; background: rgba(233, 69, 96, 0.2); }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 0 rgba(233, 69, 96, 0); } 50% { box-shadow: 0 0 20px rgba(233, 69, 96, 0.5); } }
        h1 { color: #e94560; }
        h2 { color: #f1c40f; margin-top: 20px; }
        .info { color: #95a5a6; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 SSE 实时排行榜测试</h1>
        
        <div id="status" class="status connecting">
            <strong>状态:</strong> 连接中...
        </div>
        
        <div>
            <button onclick="connect()">连接</button>
            <button onclick="disconnect()">断开</button>
            <button onclick="submitHighScore()">提交高分</button>
            <button onclick="submitRandomScore()">提交随机分数</button>
        </div>
        
        <div class="info">
            在线玩家: <span id="online-count">0</span> | 
            消息数: <span id="message-count">0</span>
        </div>
        
        <h2>🏆 实时排行榜</h2>
        <div id="score-display" class="score-display">
            <div class="info">等待数据...</div>
        </div>
        
        <h2>📋 事件日志</h2>
        <div id="event-log" class="event-log"></div>
    </div>

    <script>
        let eventSource = null;
        let messageCount = 0;
        let topScores = [];
        
        function logEvent(type, data) {
            const log = document.getElementById('event-log');
            const item = document.createElement('div');
            item.className = 'event-item';
            const time = new Date().toLocaleTimeString();
            item.innerHTML = `
                <div>[${time}] <span class="event-type">${type}</span></div>
                <div class="event-data">${JSON.stringify(data, null, 2)}</div>
            `;
            log.insertBefore(item, log.firstChild);
            messageCount++;
            document.getElementById('message-count').textContent = messageCount;
        }
        
        function updateStatus(status, text) {
            const el = document.getElementById('status');
            el.className = `status ${status}`;
            el.innerHTML = `<strong>状态:</strong> ${text}`;
        }
        
        function renderScores() {
            const container = document.getElementById('score-display');
            if (!topScores || topScores.length === 0) {
                container.innerHTML = '<div class="info">暂无数据</div>';
                return;
            }
            
            let html = '';
            topScores.slice(0, 5).forEach((record, index) => {
                const rank = index + 1;
                const rankIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `${rank}.`;
                html += `
                    <div class="score-item">
                        <span class="rank">${rankIcon}</span>
                        <span class="score">${record.score.toLocaleString()}</span>
                        <span>${record.kills}击杀 / ${record.floor}层</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        
        function connect() {
            if (eventSource) {
                eventSource.close();
            }
            
            updateStatus('connecting', '连接中...');
            
            eventSource = new EventSource('/api/scores/stream');
            
            eventSource.onopen = function(event) {
                updateStatus('connected', '已连接');
                logEvent('open', { readyState: eventSource.readyState });
            };
            
            eventSource.onerror = function(event) {
                console.error('SSE Error:', event);
                if (eventSource.readyState === EventSource.CLOSED) {
                    updateStatus('disconnected', '已断开');
                } else {
                    updateStatus('connecting', '重连中...');
                }
                logEvent('error', { readyState: eventSource.readyState });
            };
            
            eventSource.addEventListener('score_update', function(event) {
                const data = JSON.parse(event.data);
                logEvent('score_update', data);
                
                if (data.onlinePlayers !== undefined) {
                    document.getElementById('online-count').textContent = data.onlinePlayers;
                }
                
                if (data.topScores) {
                    topScores = data.topScores;
                    renderScores();
                }
                
                if (data.type === 'new_record') {
                    logEvent('NEW_RECORD', { rank: data.rank, score: data.record.score });
                    const container = document.getElementById('score-display');
                    container.classList.add('new-record');
                    setTimeout(() => container.classList.remove('new-record'), 1500);
                }
            });
            
            eventSource.addEventListener('heartbeat', function(event) {
                const data = JSON.parse(event.data);
                if (data.onlinePlayers !== undefined) {
                    document.getElementById('online-count').textContent = data.onlinePlayers;
                }
            });
        }
        
        function disconnect() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
                updateStatus('disconnected', '已断开');
                logEvent('disconnect', {});
            }
        }
        
        async function submitHighScore() {
            const score = Math.floor(Math.random() * 100000) + 100000;
            try {
                const response = await fetch('/api/scores', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        score: score,
                        kills: Math.floor(score / 100),
                        floor: Math.floor(score / 1000) + 1
                    })
                });
                const data = await response.json();
                logEvent('submit_score', data);
            } catch (e) {
                logEvent('submit_error', { error: e.message });
            }
        }
        
        async function submitRandomScore() {
            const score = Math.floor(Math.random() * 5000) + 1000;
            try {
                const response = await fetch('/api/scores', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        score: score,
                        kills: Math.floor(score / 100),
                        floor: Math.floor(score / 1000) + 1
                    })
                });
                const data = await response.json();
                logEvent('submit_score', data);
            } catch (e) {
                logEvent('submit_error', { error: e.message });
            }
        }
        
        window.onload = function() {
            connect();
        };
        
        window.onbeforeunload = function() {
            disconnect();
        };
    </script>
</body>
</html>
